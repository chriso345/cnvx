name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  build-cli:
    name: Build cnvx-cli (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: cnvx
            archive_name: cnvx-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: cnvx.exe
            archive_name: cnvx-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p cnvx-cli --release --target ${{ matrix.target }}

      - name: Prepare dist directory
        run: mkdir -p dist

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail

          mkdir -p dist

          cp "target/${{ matrix.target }}/release/cnvx" "dist/${{ matrix.bin_name }}"

          tar -czf "dist/${{ matrix.archive_name }}" \
            -C dist "${{ matrix.bin_name }}"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item `
            "target\${{ matrix.target }}\release\cnvx.exe" `
            "dist\${{ matrix.bin_name }}"

          Compress-Archive `
            -Path "dist\${{ matrix.bin_name }}" `
            -DestinationPath "dist\${{ matrix.archive_name }}" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

      - name: Dry run notice
        if: env.DRY_RUN == 'true'
        run: |
          echo "DRY RUN: publish will use --dry-run and no GitHub release will be created"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-cli
    # if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish workspace crates
    runs-on: ubuntu-latest
    needs: build-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish crates (ordered)
        run: |
          if [ "${{ env.DRY_RUN }}" = "true" ]; then
            echo "Running cargo publish --dry-run"
            cargo publish -p cnvx-core --dry-run
            cargo publish -p cnvx-math --dry-run
            cargo publish -p cnvx-parse --dry-run
            cargo publish -p cnvx-lp --dry-run
            cargo publish -p cnvx --dry-run
            cargo publish -p cnvx-cli --dry-run
          else
            cargo publish -p cnvx-core
            cargo publish -p cnvx-math
            cargo publish -p cnvx-parse
            cargo publish -p cnvx-lp
            cargo publish -p cnvx
            cargo publish -p cnvx-cli
          fi
